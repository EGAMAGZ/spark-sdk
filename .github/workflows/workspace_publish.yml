name: Workspace publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version for the release"
        required: true
        type: string

jobs:

  run-tests:
    name: "Run tests before publishing"
    uses: ./.github/workflows/test.yml
    permissions:
      contents: write

  check-and-lint:
    name: "Check formatting, linting, and typing before publishing"
    needs: run-tests
    uses: ./.github/workflows/check-and-lint.yml
    permissions:
      contents: read

  check-publishing:
    runs-on: ubuntu-latest
    needs: [ run-tests, check-and-lint ]
    timeout-minutes: 15

    permissions:
      contents: read
      id-token: write
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Check publishing
        run: deno publish --dry-run

  publish:
    runs-on: ubuntu-latest
    needs: check-publishing
    timeout-minutes: 15

    permissions:
      contents: read
      id-token: write
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Publish to JSR
        run: deno publish

  release:
    permissions:
      contents: write
      id-token: write
    name: Create a release
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: "Release build - ${{ inputs.version }}"
          generate_release_notes: true
          make_latest: true
